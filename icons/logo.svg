<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a2db0"/>
      <stop offset="0.55" stop-color="#2a1a6e"/>
      <stop offset="1" stop-color="#0b0822"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#7a5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7a5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa3b2"/>
      <stop offset="0.45" stop-color="#f2f5fb"/>
      <stop offset="0.55" stop-color="#e6eaf2"/>
      <stop offset="1" stop-color="#8b93a3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#f0a92e"/>
    </linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ed5564"/>
      <stop offset="1" stop-color="#c8344a"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- stars / sparkles -->
  <polygon transform="translate(424,96) scale(30)" fill="#ffd166"
    points="0,-1 0.235,-0.324 0.951,-0.309 0.380,0.124 0.588,0.809 0,0.4 -0.588,0.809 -0.380,0.124 -0.951,-0.309 -0.235,-0.324"/>
  <polygon transform="translate(470,158) scale(13)" fill="#ffffff" opacity="0.9"
    points="0,-1 0.235,-0.324 0.951,-0.309 0.380,0.124 0.588,0.809 0,0.4 -0.588,0.809 -0.380,0.124 -0.951,-0.309 -0.235,-0.324"/>
  <polygon transform="translate(70,150) scale(10)" fill="#ffffff" opacity="0.75"
    points="0,-1 0.235,-0.324 0.951,-0.309 0.380,0.124 0.588,0.809 0,0.4 -0.588,0.809 -0.380,0.124 -0.951,-0.309 -0.235,-0.324"/>

  <!-- two swords pointing down = "T T" -->
  <g>
    <!-- LEFT sword (cx 178) -->
    <g transform="translate(178,0)">
      <!-- pommel -->
      <circle cx="0" cy="120" r="16" fill="url(#gold)" stroke="#b9821f" stroke-width="2"/>
      <!-- grip -->
      <rect x="-12" y="132" width="24" height="50" rx="9" fill="url(#grip)"/>
      <!-- crossguard (the T bar) -->
      <rect x="-64" y="178" width="128" height="26" rx="13" fill="url(#gold)" stroke="#b9821f" stroke-width="1.5"/>
      <!-- blade -->
      <polygon points="-20,204 20,204 11,406 0,440 -11,406" fill="url(#blade)" stroke="#7c8595" stroke-width="1"/>
      <!-- blade highlight ridge -->
      <polygon points="-3,210 3,210 2,404 0,430 -2,404" fill="#ffffff" opacity="0.55"/>
    </g>
    <!-- RIGHT sword (cx 334) -->
    <g transform="translate(334,0)">
      <circle cx="0" cy="120" r="16" fill="url(#gold)" stroke="#b9821f" stroke-width="2"/>
      <rect x="-12" y="132" width="24" height="50" rx="9" fill="url(#grip)"/>
      <rect x="-64" y="178" width="128" height="26" rx="13" fill="url(#gold)" stroke="#b9821f" stroke-width="1.5"/>
      <polygon points="-20,204 20,204 11,406 0,440 -11,406" fill="url(#blade)" stroke="#7c8595" stroke-width="1"/>
      <polygon points="-3,210 3,210 2,404 0,430 -2,404" fill="#ffffff" opacity="0.55"/>
    </g>
  </g>
</svg>
